name: Pipeline CI/CD

on:
  push:
    branches:
      - main # O deploy será acionado ao realizar push na branch main
      - feat/ci-cd

jobs:
  build:
    name: Build_App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sfbjj-app:1.0.${{ github.run_number }} -t ${{ secrets.DOCKERHUB_USERNAME }}/sfbjj-app:latest .
          
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sfbjj-app:1.0.${{ github.run_number }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sfbjj-app:latest
          