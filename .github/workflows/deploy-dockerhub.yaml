name: Build e Push no Docker Hub

on:
  push:
    branches:
      - production-hostgator
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_REPO: umluks/sfbjj

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Obter código fonte do repositório (Git Checkout)
        uses: actions/checkout@v4

      - name: Configurar QEMU (Suporte multi-plataforma)
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fazer login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Calcular versão incremental da Tag
        id: versioning
        run: |
          RUN_NUMBER=${{ github.run_number }}
          PATCH_VERSION=$((RUN_NUMBER - 1))
          TAG_VERSION="1.0.${PATCH_VERSION}"
          echo "TAG_VERSION=${TAG_VERSION}" >> $GITHUB_ENV
          echo "tag_version=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "Versão incremental gerada: ${TAG_VERSION}"

      - name: Compilar imagem e subir no Docker Hub (Build and Push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ env.TAG_VERSION }}
            ${{ env.DOCKERHUB_REPO }}:latest
          build-args: |
            VITE_APP_VERSION=${{ env.TAG_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
