name: Deploy SFBJJ

on:
  push:
    branches:
      - feat/ias-hostgator
  workflow_dispatch: # Permite disparo manual via painel do GitHub

# Previne deploys simultâneos conflitantes na mesma branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar código (Lint)
        run: npm run lint

      - name: Gerar build
        run: npm run build

      - name: Publicar na HostGator (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: sfbjj/