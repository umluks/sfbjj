name: Pipeline de Deploy Unificada (HostGator & Docker Hub)

on:
  push:
    branches:
      - production-hostgator
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs-deploy-hostgator:
  deploy-hostgator:
    name: Deploy HostGator (FTP)
    runs-on: ubuntu-latest

    steps:
      - name: Obter código fonte do repositório (Git Checkout)
        uses: actions/checkout@v4

      - name: Configurar ambiente do Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências do projeto (npm ci)
        run: npm ci

      - name: Compilar a aplicação para produção (Vite Build)
        run: npm run build

      - name: Publicar arquivos compilados na HostGator via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: ./
jobs-dockerhub:          
  deploy-dockerhub:
    name: Build e Push Docker Hub
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_REPO: umluks/sfbjj-app

    steps:
      - name: Obter código fonte do repositório (Git Checkout)
        uses: actions/checkout@v4

      - name: Configurar QEMU (Suporte multi-plataforma)
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fazer login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Calcular versão incremental da Tag
        id: versioning
        run: |
          RUN_NUMBER=${{ github.run_number }}
          PATCH_VERSION=$((RUN_NUMBER - 1))
          TAG_VERSION="1.0.${PATCH_VERSION}"
          echo "TAG_VERSION=${TAG_VERSION}" >> $GITHUB_ENV
          echo "tag_version=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "Versão incremental gerada: ${TAG_VERSION}"

      - name: Compilar imagem e subir no Docker Hub (Build and Push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.versioning.outputs.tag_version }}
            ${{ env.DOCKERHUB_REPO }}:latest
          build-args: |
            VITE_APP_VERSION=${{ steps.versioning.outputs.tag_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
