name: Pipeline de Deploy Unificado

on:
  workflow_dispatch:
    inputs:
      run-hostgator:
        description: 'Enviar aplicação para o HostGator?'
        type: boolean
        default: true
      run-dockerhub:
        description: 'Gerar e publicar imagem no Docker Hub?'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Stage 1 - Build
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - id: version
        run: |
          TAG="1.0.$(( ${{ github.run_number }} - 1 ))"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Salvar artefato
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy-hostgator:
    name: Stage 2 - Deploy HostGator
    needs: build
    if: ${{ inputs.run-hostgator }}

    runs-on: ubuntu-latest

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy FTP - SFBJJ Distrito 61
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: dist/
          server-dir: ./sfbjj.distrito61.com.br

      - name: Deploy FTP - Sagrada Familia BJJ
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: dist/
          server-dir: ./sagradafamiliabjj.com.br

  deploy-dockerhub:
    name: Stage 2 - Docker Hub
    needs: build
    if: ${{ inputs.run-dockerhub }}

    runs-on: ubuntu-latest

    env:
      DOCKERHUB_REPO: umluks/sfbjj-app

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ needs.build.outputs.version }}
            ${{ env.DOCKERHUB_REPO }}:latest
          build-args: |
            VITE_APP_VERSION=${{ needs.build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max