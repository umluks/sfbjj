<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFBJJ - Conexão offline</title>
  <style>
    /* Estilo minimalista, moderno e premium - Alinhado com a identidade do SFBJJ */
    :root {
      --bg-color: #000000;
      --text-main: #f1f5f9;
      --text-sub: #94a3b8;
      --gold-primary: #d4af37;
      --gold-dark: #aa8416;
      --card-bg: #0c0c0e;
      --border-color: #1f1f23;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Elementos decorativos de fundo */
    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-translate-x-1/2, -translate-y-1/2);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(0,0,0,0) 70%);
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    /* Logotipo da Flor de Lis ou triângulo em SVG */
    .logo-container {
      margin-bottom: 30px;
      display: inline-block;
      position: relative;
    }

    .logo-svg {
      width: 80px;
      height: 80px;
      color: var(--gold-primary);
      animation: pulse-glow 3s infinite ease-in-out;
    }

    @keyframes pulse-glow {
      0%, 100% {
        filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.2));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
        transform: scale(1.03);
      }
    }

    h1 {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
      background: linear-gradient(to right, #ffffff, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    /* Botão estilizado com gradiente e hover sutil */
    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-dark) 100%);
      color: #000000;
      border: none;
      padding: 14px 28px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
    }

    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
    }

    .btn-retry:active {
      transform: translateY(0);
    }

    /* Sinalizador visual de status offline */
    .offline-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .offline-dot {
      width: 6px;
      height: 6px;
      background-color: #ef4444;
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  
  <div class="container">
    <div class="logo-container">
      <!-- Triângulo clássico do Jiu-Jitsu estilizado em SVG -->
      <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 15 L85 80 L15 80 Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round" />
        <path d="M50 30 L73 72 L27 72 Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" opacity="0.7" />
        <circle cx="50" cy="58" r="6" fill="currentColor" />
      </svg>
    </div>

    <div class="offline-badge">
      <span class="offline-dot"></span>
      Sem Conexão
    </div>

    <h1>Fora de Combate</h1>
    <p>O tatame da internet caiu por um instante. Não conseguimos carregar as informações do sistema SFBJJ neste momento. Verifique sua conexão e tente novamente.</p>

    <button class="btn-retry" onclick="window.location.reload()">
      Tentar Novamente
    </button>
  </div>
</body>
</html>
